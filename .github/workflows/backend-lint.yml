name: Backend Linting & Code Quality

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-lint.yml'
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-lint.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run linting
        working-directory: backend
        run: npm run lint
        continue-on-error: true

      - name: Check code formatting
        working-directory: backend
        run: npm run format:check
        continue-on-error: true

      - name: Run tests
        working-directory: backend
        run: npm test
        continue-on-error: true

      - name: Comment on PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const checksPassed = context.job.status === 'success';
            
            const comment = checksPassed 
              ? '✅ All backend code quality checks passed!'
              : '⚠️ Some backend code quality checks failed. Please review the annotations above.';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
